<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Login / Register</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-Vz9PZQF11BtbT5F01FJFiWuggMLjt3E1W3+E3ZwF+V8x+fdCjTBQHn0aczYXMdTa8QBuN0PpbDyXlP6LlXk8Hg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        :root {
            --primary: #0d6efd;
            --primary-dark: #0b5ed7;
            --bg: #0d1117;
            --panel: rgba(255, 255, 255, 0.14);
            --panel-border: rgba(255, 255, 255, 0.18);
            --text: #e9ecef;
            --muted: rgba(233, 236, 239, 0.75);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, rgba(13, 110, 253, 0.55), transparent 55%),
                linear-gradient(180deg, #07102c 0%, #0a0c12 100%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .card {
            width: min(520px, 100%);
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 18px;
            padding: 32px 28px;
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(14px);
        }

        .card h1 {
            margin: 0 0 10px;
            font-size: 1.85rem;
            letter-spacing: 0.6px;
        }

        .card p.subtitle {
            margin: 0 0 26px;
            color: var(--muted);
        }

        .sections {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 18px;
            padding: 22px;
        }

        .panel h2 {
            margin: 0 0 10px;
            font-size: 1.25rem;
            color: var(--text);
        }

        .section-subtitle {
            margin: 0 0 18px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        form {
            display: grid;
            gap: 16px;
        }

        label {
            display: grid;
            gap: 8px;
            font-size: 0.92rem;
            color: var(--muted);
        }

        input {
            width: 100%;
            padding: 11px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            font-size: 0.98rem;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.35);
            border-color: rgba(13, 110, 253, 0.6);
        }

        .form-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .btn {
            border: none;
            border-radius: 999px;
            padding: 12px 18px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .btn.primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 14px 28px rgba(9, 101, 212, 0.35);
        }

        .btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 36px rgba(9, 101, 212, 0.35);
        }

        .btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.22);
        }

        .btn.secondary:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .footer {
            margin-top: 22px;
            font-size: 0.85rem;
            color: rgba(233, 236, 239, 0.65);
            text-align: center;
        }

        .footer a {
            color: rgba(13, 110, 253, 0.9);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            body {
                padding: 24px 12px;
            }

            .card {
                padding: 26px 18px;
            }

            .sections {
                gap: 16px;
            }
        }
    </style>
    <link rel="stylesheet" href="theme.css" />
    <script src="theme.js" defer></script>
    <script src="api-config.js"></script>
</head>
<body>

<div class="card" role="main">
    <h1>Teacher Portal</h1>
    <p class="subtitle">Login to continue or register for a new account.</p>
    <div class="sections">
        <section class="panel" id="existing">
            <h2>Existing teacher</h2>
            <p class="section-subtitle">Sign in to access your dashboard.</p>

            <form id="login" autocomplete="off">
                <label>
                    Teacher Email
                    <input type="email" name="email" placeholder="you@example.com" required />
                </label>
                <label>
                    Password
                    <input type="password" name="password" placeholder="••••••••" required />
                </label>
                <div class="form-actions">
                    <button class="btn primary" type="submit">Login</button>
                
                </div>
            </form>
        </section>

        
             
        <p class="subtitle"><a class="btn secondary" href="index.html"> Go Back </a></p>
    </div>

    <p class="footer">
        <span>Need help?</span>
        <a href="#" onclick="alert('Contact your administrator for support'); return false;">Contact support</a>
    </p>
</div>

<script>
    document.getElementById('switchToRegister').addEventListener('click', () => {
        document.getElementById('new').scrollIntoView({ behavior: 'smooth' });
    });

    document.getElementById('switchToLogin').addEventListener('click', () => {
        document.getElementById('existing').scrollIntoView({ behavior: 'smooth' });
    });

    document.getElementById('login').addEventListener('submit', async e => {
        e.preventDefault();
        window.location.href = 'teacher home .html';
    });

    document.getElementById('register').addEventListener('submit', async e => {
        e.preventDefault();

        const name = document.querySelector('#register input[name="name"]').value;
        const email = document.querySelector('#register input[name="email"]').value;
        const teacherId = document.querySelector('#register input[name="teacherId"]').value;
        const password = document.querySelector('#register input[name="password"]').value;
        const confirm = document.querySelector('#register input[name="confirm"]').value;

        if (password !== confirm) {
            alert('Passwords do not match!');
            return;
        }

        const result = await SmartExamAPI.teacherRegister(name, email, teacherId, password, confirm);

        if (result.success) {
            alert('Registration successful! Redirecting to dashboard...');
            window.location.href = 'teacher home .html';
        } else {
            alert('Registration failed: ' + result.message);
        }
    });
</script>
</body>
</html>
