<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Leaderboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --bg: #0f172a;
    --panel: rgba(255,255,255,0.06);
    --text: #e2e8f0;
    --primary: #3b82f6;
}

body {
    margin: 0;
    font-family: system-ui;
    background: linear-gradient(180deg,#020617,#0f172a);
    color: var(--text);
}

/* NAV */
header {
    display:flex;
    justify-content:space-between;
    padding:20px;
    background:rgba(0,0,0,0.4);
}

.back {
    color:white;
    text-decoration:none;
}

/* CONTAINER */
.container {
    max-width:1000px;
    margin:40px auto;
    padding:20px;
}

/* CARD */
.card {
    background: var(--panel);
    padding:20px;
    border-radius:15px;
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td {
    padding:12px;
    text-align:left;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

/* TOP 3 HIGHLIGHT */
.gold {color: gold;}
.silver {color: silver;}
.bronze {color: #cd7f32;}

.refresh {
    background: var(--primary);
    border:none;
    padding:10px 20px;
    border-radius:20px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <a href="studenthome.html" class="back"><i class="fa fa-arrow-left"></i> Back to dashboard</a>
    <h2>🏆 Leaderboard</h2>
    <button class="refresh" onclick="generateLeaderboard()">Refresh</button>
</header>

<div class="container">

<div class="card">
    <h2>Top Students</h2>

    <table>
        <thead>
            <tr>
                <th>Rank</th>
                <th>Student</th>
                <th>Total Score</th>
                <th>Tests</th>
                <th>Average</th>
            </tr>
        </thead>
        <tbody id="leaderboardTable"></tbody>
    </table>

</div>

</div>

<script>
// LOAD DATA
function loadResults() {
    return JSON.parse(localStorage.getItem('smartexam_results') || '[]');
}

// GENERATE LEADERBOARD
function generateLeaderboard() {
    const results = loadResults();

    const studentMap = {};

    // GROUP DATA
    results.forEach(r => {
        if (!studentMap[r.student]) {
            studentMap[r.student] = {
                name: r.student,
                totalScore: 0,
                tests: 0
            };
        }

        studentMap[r.student].totalScore += r.score;
        studentMap[r.student].tests += 1;
    });

    const leaderboard = Object.values(studentMap);

    // SORT
    leaderboard.sort((a, b) => b.totalScore - a.totalScore);

    // RANK
    leaderboard.forEach((s, i) => {
        s.rank = i + 1;
        s.avg = (s.totalScore / s.tests).toFixed(2);
    });

    const table = document.getElementById('leaderboardTable');

    if (!leaderboard.length) {
        table.innerHTML = `<tr><td colspan="5">No data available</td></tr>`;
        return;
    }

    // RENDER
    table.innerHTML = leaderboard.map(s => {
        let medal = '';
        let cls = '';

        if (s.rank === 1) { medal = '🥇'; cls = 'gold'; }
        else if (s.rank === 2) { medal = '🥈'; cls = 'silver'; }
        else if (s.rank === 3) { medal = '🥉'; cls = 'bronze'; }

        return `
        <tr class="${cls}">
            <td>${medal} ${s.rank}</td>
            <td>${s.name}</td>
            <td>${s.totalScore}</td>
            <td>${s.tests}</td>
            <td>${s.avg}</td>
        </tr>`;
    }).join('');
}

// AUTO LOAD
generateLeaderboard();
</script>

</body>
</html>
