<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Assignments</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #060a11;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-blue: #2b59ff;
            --text-main: #ebf2ff;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.5;
        }

        /* Top Navigation Bar */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(11, 18, 32, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-left a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }

        .nav-left a:hover { color: var(--text-main); }

        .nav-right { font-weight: 600; font-size: 0.9rem; }

        /* Main Content Container */
        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h2 { font-size: 1.8rem; margin: 0; font-weight: 700; }

        .btn-refresh {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(43, 89, 255, 0.3);
            transition: transform 0.2s, background 0.2s;
        }

        .btn-refresh:hover {
            background: #1e46d9;
            transform: translateY(-1px);
        }

        /* Table Styling */
        .table-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255,255,255,0.02);
            padding: 1.2rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.95rem;
        }

        tr:hover td { background: rgba(255,255,255,0.02); }

        /* Modern Status Pills */
        .status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status.submitted { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .status.late { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .status.pending { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border: 1px solid var(--border); }

        /* Action Buttons */
        .btn-action {
            padding: 6px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .btn-view { background: #334155; color: white; }
        .btn-view:hover { background: #475569; }

        /* Modal Design */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            place-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #111827;
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        hr { border: 0; border-top: 1px solid var(--border); margin: 1.5rem 0; }

        input[type="file"] {
            display: block;
            width: 100%;
            margin-bottom: 1rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <div class="nav-left">
            <a href="studenthome.html"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
        </div>
        <div class="nav-right">
            <i class="fa-solid fa-circle-user"></i> John Doe
        </div>
    </nav>

    <div class="container">
        <div class="header-section">
            <h2>Your Assignments</h2>
            <button class="btn-refresh" onclick="render()">Refresh List</button>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Subject</th>
                        <th>Due Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="studentTable"></tbody>
            </table>
        </div>
    </div>

    <div id="actionModal" class="modal">
        <div class="modal-content">
            <h3 id="mTitle" style="margin-top:0"></h3>
            <p id="mDesc" style="color:var(--text-muted); font-size:0.95rem;"></p>
            <hr>
            <div id="submitSection">
                <h4 style="margin-top:0">Upload Submission</h4>
                <input type="file" id="fileInput" accept=".pdf">
                <button class="btn-refresh" id="finalSubmit" style="width:100%">Upload to Teacher</button>
            </div>
            <button onclick="closeModal()" class="btn-action btn-view" style="width:100%; margin-top:0.8rem">Close</button>
        </div>
    </div>

    <script>
        const studentName = "John Doe"; 
        let activeId = null;

        const getAssign = () => JSON.parse(localStorage.getItem('smartexam_assignments') || '[]');
        const getSubs = () => JSON.parse(localStorage.getItem('smartexam_submissions') || '[]');

        function openModal(id) {
            activeId = id;
            const a = getAssign().find(x => x.id == id);
            const sub = getSubs().find(s => s.assignmentId == id && s.student == studentName);
            
            document.getElementById('mTitle').innerText = a.title;
            document.getElementById('mDesc').innerText = a.description || "No specific instructions provided.";
            document.getElementById('submitSection').style.display = sub ? 'none' : 'block';
            document.getElementById('actionModal').style.display = 'grid';
        }

        const closeModal = () => document.getElementById('actionModal').style.display = 'none';

        document.getElementById('finalSubmit').onclick = async () => {
            const file = document.getElementById('fileInput').files[0];
            if(!file) return alert("Please select a PDF file first.");

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                const submissions = getSubs();
                submissions.push({
                    assignmentId: activeId,
                    student: studentName,
                    submittedAt: new Date().toLocaleString(),
                    fileName: file.name,
                    fileData: reader.result.split(',')[1] 
                });
                localStorage.setItem('smartexam_submissions', JSON.stringify(submissions));
                alert("Assignment submitted successfully!");
                closeModal();
                render();
            };
        };

        function render() {
            const table = document.getElementById('studentTable');
            const assignments = getAssign();
            const subs = getSubs();
            
            if(assignments.length === 0) {
                table.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:3rem; color:var(--text-muted)">No assignments found.</td></tr>';
                return;
            }

            table.innerHTML = assignments.map(a => {
                const mySub = subs.find(s => s.assignmentId == a.id && s.student == studentName);
                const isLate = !mySub && new Date() > new Date(a.dueDate);
                return `
                <tr>
                    <td style="font-weight:600">${a.title}</td>
                    <td><span style="color:var(--text-muted)">${a.subject}</span></td>
                    <td>${a.dueDate}</td>
                    <td><span class="status ${mySub ? 'submitted' : (isLate ? 'late' : 'pending')}">${mySub ? 'DONE' : (isLate ? 'LATE' : 'PENDING')}</span></td>
                    <td><button class="btn-action btn-view" onclick="openModal(${a.id})">${mySub ? 'View Task' : 'Submit Now'}</button></td>
                </tr>`;
            }).join('');
        }
        
        render();

        // Close modal if clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('actionModal');
            if (event.target == modal) closeModal();
        }
    </script>
</body>
</html>
