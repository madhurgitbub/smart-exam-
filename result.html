<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Test Results</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
    --bg:#020617;
    --panel:#0f172a;
    --text:#e2e8f0;
    --primary:#3b82f6;
}

body{
    margin:0;
    font-family:system-ui;
    background:var(--bg);
    color:var(--text);
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    background:rgba(0,0,0,0.4);
}

header a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.refresh{
    background:var(--primary);
    border:none;
    padding:8px 16px;
    border-radius:20px;
    color:white;
    cursor:pointer;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:40px auto;
    padding:20px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    background:var(--panel);
    border-radius:12px;
    overflow:hidden;
}

th,td{
    padding:14px;
    border-bottom:1px solid #1e293b;
    text-align:left;
}

th{
    background:#1e293b;
}

/* STATUS */
.pass{color:#22c55e;font-weight:bold;}
.fail{color:#ef4444;font-weight:bold;}

/* EMPTY */
.empty{
    text-align:center;
    padding:40px;
    color:gray;
}
</style>
</head>

<body>

<header>
    <a href="studenthome.html">
        <i class="fa fa-arrow-left"></i> Back to dashboard
    </a>

    <h2>📊 My Results</h2>

    <button class="refresh" onclick="renderResults()">
        <i class="fa fa-rotate"></i> Refresh
    </button>
</header>

<div class="container">

    <table>
        <thead>
            <tr>
                <th>Subject</th>
                <th>Test Name</th>
                <th>Score</th>
                <th>Percentage</th>
                <th>Time (min)</th>
                <th>Date</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="resultTable"></tbody>
    </table>

</div>

<script>

// LOAD RESULTS
function loadResults(){
    return JSON.parse(localStorage.getItem('smartexam_results') || '[]');
}

// RENDER RESULTS
function renderResults(){

    const results = loadResults();
    const table = document.getElementById('resultTable');

    if(!results.length){
        table.innerHTML = `
        <tr>
            <td colspan="7" class="empty">
                No tests attempted yet 🚫
            </td>
        </tr>`;
        return;
    }

    // Show latest first
    results.reverse();

    table.innerHTML = results.map(r => {

        const percent = ((r.score / r.totalMarks) * 100).toFixed(1);
        const pass = percent >= 40;

        return `
        <tr>
            <td>${r.subject || '-'}</td>
            <td>${r.testName || '-'}</td>
            <td>${r.score} / ${r.totalMarks}</td>
            <td>${percent}%</td>
            <td>${r.durationMinutes || 0}</td>
            <td>${new Date(r.date).toLocaleString()}</td>
            <td class="${pass ? 'pass':'fail'}">
                ${pass ? 'PASS ✅' : 'FAIL ❌'}
            </td>
        </tr>
        `;
    }).join('');
}

// AUTO LOAD
renderResults();

</script>

</body>
</html>
