<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Results</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-Vz9PZQF11BtbT5F01FJFiWuggMLjt3E1W3+E3ZwF+V8x+fdCjTBQHn0aczYXMdTa8QBuN0PpbDyXlP6LlXk8Hg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        :root {
            --bg: #0b1220;
            --panel: rgba(255, 255, 255, 0.08);
            --panel-border: rgba(255, 255, 255, 0.16);
            --text: #ebf2ff;
            --muted: rgba(235, 242, 255, 0.7);
            --primary: #0d6efd;
            --primary-2: #6610f2;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, rgba(13, 110, 253, 0.45), transparent 55%),
                linear-gradient(180deg, #081427 0%, #060a11 100%);
            color: var(--text);
        }

        header {
            padding: 18px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            background: rgba(7, 11, 23, 0.6);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .brand {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: 0.4px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-weight: 600;
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 999px;
            transition: background 0.18s ease, color 0.18s ease;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.12);
            color: var(--text);
        }

        main {
            padding: 32px 24px;
            max-width: 980px;
            margin: 0 auto;
        }

        .page-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .page-title h1 {
            margin: 0;
            font-size: 2.1rem;
        }

        .subtitle {
            margin: 10px 0 24px;
            color: var(--muted);
            max-width: 620px;
        }

        .table-wrap {
            overflow-x: auto;
            border-radius: 18px;
            box-shadow: 0 18px 38px rgba(0, 0, 0, 0.32);
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 780px;
        }

        thead {
            background: rgba(255, 255, 255, 0.08);
        }

        th,
        td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 0.02em;
        }

        td {
            color: rgba(235, 242, 255, 0.88);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.06);
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .status.completed {
            background: rgba(0, 195, 118, 0.2);
            color: #00c376;
        }

        .status.needs {
            background: rgba(255, 210, 0, 0.18);
            color: #f8c032;
        }

        .status.missed {
            background: rgba(255, 75, 75, 0.15);
            color: #ff6767;
        }

        .empty-state {
            padding: 48px;
            text-align: center;
            color: var(--muted);
        }

        .empty-state h2 {
            margin: 0 0 12px;
            font-size: 1.7rem;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 24px 0 0;
        }

        .button-row a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            border-radius: 999px;
            text-decoration: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            color: white;
            font-weight: 700;
            box-shadow: 0 18px 36px rgba(9, 101, 212, 0.35);
        }

        @media (max-width: 780px) {
            .table-wrap {
                min-width: 0;
            }

            table {
                min-width: 0;
            }
        }
    </style>
    <link rel="stylesheet" href="../common/theme.css" />
    <script src="../common/theme.js" defer></script>
</head>
<body>

<header>
    <a href="teacher home .html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to dashboard</a>
    <div class="brand">Student Results</div>
</header>

<main>
    <div class="page-title">
        <div>
            <h1>Student Results</h1>
            <p class="subtitle">Review results from all students who have taken a test.</p>
        </div>
        <div class="button-row">
            <a href="#" id="refresh"><i class="fa-solid fa-rotate"></i> Refresh</a>
            <a href="#" id="export"><i class="fa-solid fa-download"></i> Export CSV</a>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Student</th>
                    <th>Test</th>
                    <th>Score</th>
                    <th>Duration</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
        </table>
        <div class="empty-state" id="emptyState" style="display:none;">
            <h2>No test results yet</h2>
            <p>Once students start taking tests, results will appear here.</p>
        </div>
    </div>
</main>

<script>
    const resultsBody = document.getElementById('resultsBody');
    const emptyState = document.getElementById('emptyState');
    const refreshBtn = document.getElementById('refresh');
    const exportBtn = document.getElementById('export');

    function formatDate(iso) {
        const date = new Date(iso);
        return date.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function loadResults() {
        return JSON.parse(localStorage.getItem('smartexam_results') || '[]');
    }

    function render() {
        const results = loadResults();
        resultsBody.innerHTML = '';

        if (!results.length) {
            emptyState.style.display = 'block';
            return;
        }

        emptyState.style.display = 'none';

        results.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(result => {
            const percent = result.totalMarks ? Math.round((result.score / result.totalMarks) * 100) : 0;
            const status = percent >= 50 ? 'completed' : 'missed';

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${formatDate(result.date)}</td>
                <td>${result.student || 'Student'}</td>
                <td>${result.testName || '—'}</td>
                <td><strong>${result.score} / ${result.totalMarks}</strong> (${percent}%)</td>
                <td>${result.durationMinutes ?? '—'}m</td>
                <td><span class="status ${status}">${status === 'completed' ? 'Completed ✅' : 'Needs improvement ⚠️'}</span></td>
            `;

            resultsBody.appendChild(row);
        });
    }

    function exportCsv() {
        const results = loadResults();
        if (!results.length) {
            alert('No results to export yet.');
            return;
        }

        const headers = ['Date', 'Student', 'Test', 'Score', 'Total Marks', 'Percentage', 'Duration', 'Status'];
        const rows = results.map(r => {
            const percent = r.totalMarks ? Math.round((r.score / r.totalMarks) * 100) : 0;
            const status = percent >= 50 ? 'Completed' : 'Needs improvement';
            return [formatDate(r.date), r.student, r.testName, r.score, r.totalMarks, `${percent}%`, `${r.durationMinutes}m`, status];
        });

        const csvContent = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'student-results.csv';
        link.click();
        URL.revokeObjectURL(url);
    }

    refreshBtn.addEventListener('click', e => {
        e.preventDefault();
        render();
    });

    exportBtn.addEventListener('click', e => {
        e.preventDefault();
        exportCsv();
    });

    // Auto-refresh every 2 seconds to show new results in real-time
    render();
    setInterval(render, 2000);
</script>
</body>
</html>
