!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Assignments - Teacher</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #060a11;
            --nav-bg: rgba(11, 18, 32, 0.8);
            --panel: rgba(255, 255, 255, 0.05);
            --text: #ebf2ff;
            --text-muted: #94a3b8;
            --primary: #2563eb; 
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(180deg, #0f172a 0%, #020617 100%);
            color: var(--text);
        }

        /* Top Navigation Bar */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-left a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }

        .nav-left a:hover { color: var(--text-main); }

        .nav-right { font-weight: 600; font-size: 0.9rem; color: var(--text-muted); }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

        h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 5px; }
        .subtitle { color: rgba(255,255,255,0.6); margin-bottom: 30px; }

        .btn-refresh {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            transition: 0.2s;
        }

        .btn-refresh:hover { transform: translateY(-1px); opacity: 0.9; }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            margin: 10px 0 20px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
            color: white;
            box-sizing: border-box;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 0.95rem;
            background: var(--panel);
            border-radius: 12px;
            overflow: hidden;
        }

        th {
            text-align: left;
            padding: 15px;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
        }

        td {
            padding: 18px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .btn-view {
            background: rgba(255,255,255,0.15);
            color: white;
            border-radius: 8px;
            padding: 6px 16px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; place-items: center; z-index: 1000; }
        .modal-content { background: #0f172a; padding: 30px; border-radius: 20px; width: 80%; max-width: 800px; max-height: 80vh; border: 1px solid #334155; overflow-y: auto; }
    </style>
</head>
<body>

<nav class="nav-bar">
    <div class="nav-left">
        <a href="teacher home .html"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
    </div>
    <div class="nav-right">
        <i class="fa-solid fa-chalkboard-user"></i> Teacher Panel
    </div>
</nav>

<div class="container">
    <h1>Your Assignments</h1>
    <p class="subtitle">Create and manage student tasks.</p>
    
    <div class="card">
        <form id="assignmentForm">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <input type="text" name="title" placeholder="Assignment Title" required>
                <input type="text" name="subject" placeholder="Subject" required>
            </div>
            <input type="date" name="dueDate" required>
            <textarea name="description" placeholder="Description/Instructions for students..." rows="3"></textarea>
            <button type="submit" class="btn-refresh">Save Assignment</button>
        </form>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 40px; margin-bottom: 10px;">
        <h2 style="margin:0">Recent Assignments</h2>
        <button class="btn-refresh" onclick="render()">Refresh</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Subject</th>
                <th>Due Date</th>
                <th>Status</th>
                <th>Submission</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="teacherTable"></tbody>
    </table>
</div>

<div id="subModal" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
            <h3 style="margin:0">Student Submissions</h3>
            <button onclick="closeSubModal()" class="btn-view">Close</button>
        </div>
        <div id="subList" style="margin-top:20px;"></div>
    </div>
</div>

<script>
    const getAssign = () => JSON.parse(localStorage.getItem('smartexam_assignments') || '[]');
    const getSubs = () => JSON.parse(localStorage.getItem('smartexam_submissions') || '[]');

    document.getElementById('assignmentForm').onsubmit = (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const assignments = getAssign();
        assignments.push({
            id: Date.now(),
            title: fd.get('title'),
            subject: fd.get('subject'),
            dueDate: fd.get('dueDate'),
            description: fd.get('description')
        });
        localStorage.setItem('smartexam_assignments', JSON.stringify(assignments));
        e.target.reset();
        render();
    };

    function showSubs(id) {
        const subs = getSubs().filter(s => s.assignmentId == id);
        const list = document.getElementById('subList');
        list.innerHTML = subs.length ? '' : '<p style="color:gray; text-align:center; padding: 20px;">No submissions yet.</p>';
        subs.forEach(s => {
            const pdfUrl = `data:application/pdf;base64,${s.fileData}`;
            list.innerHTML += `<div style="padding:15px; border-bottom:1px solid #334155;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <div>
                        <strong style="font-size: 1.1rem;">${s.student}</strong><br>
                        <small style="color: var(--text-muted)">Submitted on: ${s.submittedAt || 'N/A'}</small>
                    </div>
                    <a href="${pdfUrl}" download="${s.fileName}" class="btn-view" style="text-decoration: none; background: var(--primary);">Download PDF</a>
                </div>
                <iframe src="${pdfUrl}" type="application/pdf" width="100%" height="400px" style="border: 1px solid var(--border); border-radius: 8px;"></iframe>
            </div>`;
        });
        document.getElementById('subModal').style.display = 'grid';
    }

    const closeSubModal = () => document.getElementById('subModal').style.display = 'none';

    function render() {
        const table = document.getElementById('teacherTable');
        const subs = getSubs();
        const assignments = getAssign();

        if (assignments.length === 0) {
            table.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px; color:var(--text-muted)">No assignments created yet.</td></tr>';
            return;
        }

        table.innerHTML = assignments.map(a => {
            const subCount = subs.filter(s => s.assignmentId == a.id).length;
            return `
            <tr>
                <td style="font-weight:600">${a.title}</td>
                <td><span style="color:var(--text-muted)">${a.subject}</span></td>
                <td>${a.dueDate}</td>
                <td><span style="background:rgba(16, 185, 129, 0.1); color: #10b981; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:bold; border: 1px solid rgba(16, 185, 129, 0.2);">ACTIVE</span></td>
                <td>${subCount} Submissions</td>
                <td><button class="btn-view" onclick="showSubs(${a.id})">View Subs</button></td>
            </tr>`;
        }).join('');
    }

    render();

    // Close modal on outside click
    window.onclick = function(event) {
        const modal = document.getElementById('subModal');
        if (event.target == modal) closeSubModal();
    }
</script>
</body>
</html>
